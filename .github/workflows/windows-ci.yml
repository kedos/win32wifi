name: Windows CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pylint ".[test]"
        
    - name: Run Ruff (Linting & Formatting Check)
      run: ruff check .
      
    - name: Run Pylint
      run: pylint win32wifi/
        
    - name: Run mocked tests (no hardware)
      run: pytest -v

    - name: Enable WLAN AutoConfig service
      shell: pwsh
      run: |
        try {
          Set-Service -Name Wlansvc -StartupType Manual -ErrorAction Stop
          Start-Service -Name Wlansvc -ErrorAction Stop
          $svc = Get-Service -Name Wlansvc
          Write-Host "Wlansvc status: $($svc.Status)"
        } catch {
          Write-Host "Wlansvc could not be started (expected on runners without a wifi NIC): $_"
        }

    - name: Run hardware tests
      run: pytest -v -m hardware

