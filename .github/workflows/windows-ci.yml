name: Windows CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pylint comtypes xmltodict .
        
    - name: Run Ruff (Linting & Formatting Check)
      run: ruff check .
      
    - name: Run Pylint
      run: pylint win32wifi/
        
    - name: Run Mock Tests
      run: |
        python tests/test_mocked_api.py
        
    - name: Run Native API Tests
      run: |
        # This will run on a real Windows machine. 
        # Even if there's no WiFi, it should at least load the DLL and fail gracefully.
        python tests/Win32NativeWifiApiTests.py
      continue-on-error: true
